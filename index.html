<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>退休倒计时计算器（2025官方新规）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: #f7f8fc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: white;
            width: 100%;
            max-width: 420px;
            padding: 36px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .title {
            font-size: 24px;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 6px;
            text-align: center;
        }

        .desc {
            text-align: center;
            color: #86868b;
            margin-bottom: 32px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #1d1d1f;
            font-weight: 500;
            font-size: 15px;
        }

        input[type="date"],
        select {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e2e2e5;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: border 0.2s;
        }

        input[type="date"]:focus,
        select:focus {
            border-color: #007aff;
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: #007aff;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        .btn:hover {
            background: #0066cc;
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            background: #f0f7ff;
            border-radius: 12px;
            text-align: center;
            display: none;
        }

        .result.show {
            display: block;
        }

        .result .days {
            font-size: 36px;
            font-weight: 700;
            color: #007aff;
            margin: 8px 0;
        }

        .result .text {
            color: #1d1d1f;
            font-size: 16px;
        }

        .result .info {
            margin-top: 10px;
            font-size: 14px;
            color: #86868b;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="title">⏳ 退休倒计时（2025官方新规）</div>
        <div class="desc">按人社部2025年1月1日起执行的延迟退休政策计算</div>

        <div class="form-group">
            <label>出生日期</label>
            <input type="date" id="birth" required>
        </div>

        <div class="form-group">
            <label>性别/类型</label>
            <select id="gender">
                <option value="male">男职工（原60岁→延至63岁）</option>
                <option value="female55">女干部/原55岁女职工（延至58岁）</option>
                <option value="female50">女工人/原50岁女职工（延至55岁）</option>
            </select>
        </div>

        <button class="btn" onclick="calculate()">开始计算</button>

        <div class="result" id="result">
            <div class="text">距离退休还有</div>
            <div class="days" id="days">0</div>
            <div class="text">天</div>
            <div class="info" id="info"></div>
        </div>
    </div>

    <script>
        const POLICY_START = new Date(2025, 0, 1); // 2025-01-01

        // 加 N 个月
        function addMonths(date, months) {
            let d = new Date(date);
            d.setMonth(d.getMonth() + months);
            return d;
        }

        function calcRetireDate(birthDate, type) {
            // 1. 原始退休年龄
            let baseYears, maxDelayMonths, stepMonths, stepDelay;
            if (type === 'male') {
                baseYears = 60;
                maxDelayMonths = 36; // 60→63：+36个月
                stepMonths = 4;
                stepDelay = 1;
            } else if (type === 'female55') {
                baseYears = 55;
                maxDelayMonths = 36; // 55→58：+36个月
                stepMonths = 4;
                stepDelay = 1;
            } else { // female50
                baseYears = 50;
                maxDelayMonths = 60; // 50→55：+60个月
                stepMonths = 2;
                stepDelay = 1;
            }

            // 原始退休日（未延迟）
            let original = new Date(birthDate);
            original.setFullYear(birthDate.getFullYear() + baseYears);

            // 如果原始退休日 <= 政策开始日：不延迟
            if (original <= POLICY_START) {
                return original;
            }

            // 从政策开始日到原始退休日的总月数
            let totalMonths =
                (original.getFullYear() - POLICY_START.getFullYear()) * 12 +
                (original.getMonth() - POLICY_START.getMonth());

            // 应延迟月数
            let delay = Math.floor(totalMonths / stepMonths) * stepDelay;
            delay = Math.min(delay, maxDelayMonths); // 不超过上限

            // 最终退休日
            return addMonths(original, delay);
        }

        function calculate() {
            const birthVal = document.getElementById('birth').value;
            const gender = document.getElementById('gender').value;
            const result = document.getElementById('result');
            const daysEl = document.getElementById('days');
            const infoEl = document.getElementById('info');

            if (!birthVal) {
                alert('请选择出生日期');
                return;
            }

            const birthDate = new Date(birthVal);
            const retireDate = calcRetireDate(birthDate, gender);
            const now = new Date();

            let diffTime = retireDate - now;
            if (diffTime <= 0) {
                daysEl.innerText = "已退休";
                infoEl.innerText = `退休日期：${retireDate.toLocaleDateString()}`;
            } else {
                let days = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                daysEl.innerText = days;
                infoEl.innerText = `退休日期：${retireDate.toLocaleDateString()}（${(retireDate.getFullYear()-birthDate.getFullYear())}岁）`;
            }

            result.classList.add('show');
        }
    </script>

</body>
</html>
